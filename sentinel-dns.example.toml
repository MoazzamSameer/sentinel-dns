# Example sentinel-dns config. Copy to sentinel-dns.toml, edit, then:
#
#   sentinel-dns --config sentinel-dns.toml
#
# Schema is flat — each key maps directly to a field on the Config
# dataclass. Sections are not supported (they'll be rejected at load
# time). Any field can also be overridden on the CLI; CLI flags win
# over file values.
#
# Every key is optional — defaults match the dataclass.

# --- Listener ---
listen_host = "127.0.0.1"
listen_port = 5354

# --- Upstream resolver (forwarded queries) ---
upstream_host = "1.1.1.1"
upstream_port = 53
upstream_timeout = 2.0

# --- Inline classifier ---
# Path to a model trained with scripts/train_classifier.py.
# Comment out (or set to empty string) to disable scoring entirely.
model_path = "models/classifier_v0.joblib"
# Score threshold for blocking. 0.836 ≈ 0.1% FPR / 95% precision per Spike B.
block_threshold = 0.836

# --- Static blocklist ---
# Set to URLhaus's host file or any hostfile-format feed. Comment out
# to disable. Refresh interval in seconds.
blocklist_url = "https://urlhaus.abuse.ch/downloads/hostfile/"
blocklist_refresh_s = 3600

# --- Decision cache ---
cache_capacity = 100000

# --- Enforcement ---
# false = measurement-only (logs decisions, forwards everything).
# true  = blocks queries flagged by the inline tier (returns NXDOMAIN).
# Recommended: leave this `false` until you've watched the log for a
# day or two and trust the classifier on your traffic.
enforce = false

# --- SQLite query log ---
# Path to a SQLite file. Comment out to disable. Retention in days.
log_path = "sentinel.db"
log_retention_days = 7

# --- Stdout output ---
# When false, stdout score lines are suppressed (BLOCK + explain lines
# still appear). The SQLite log captures every query regardless.
score_logging = true
