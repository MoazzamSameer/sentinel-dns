name: Docker

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "pyproject.toml"
      - "sentinel_dns/**"
      - ".github/workflows/docker.yml"
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build:
    name: Build (multi-arch)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        # Needed to build linux/arm64 on the amd64 GitHub runner.
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        # PRs from forks can't push to GHCR — only attempt login when we'll push.
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build (and push, except on PR)
        uses: docker/build-push-action@v6
        with:
          context: .
          # On PR: build only the native runner arch so we can `--load`
          # into Docker and run the smoke test below. buildx refuses to
          # `--load` multi-platform manifest lists. On main/tag pushes
          # we build both arches and push the manifest list to GHCR.
          platforms: ${{ github.event_name == 'pull_request' && 'linux/amd64' || 'linux/amd64,linux/arm64' }}
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-test the amd64 image
        # `load: true` above only loaded a single arch; on PRs that's the
        # native arch (amd64). For tag pushes we re-pull the published
        # tag for the runner arch.
        if: github.event_name == 'pull_request'
        run: |
          # Find the locally loaded image tag — pick the first one buildx wrote.
          IMG=$(echo "${{ steps.meta.outputs.tags }}" | head -1)
          echo "smoke-testing $IMG"
          docker run --rm -d -p 5354:5354/udp --name sd "$IMG" \
            --listen-host 0.0.0.0 --listen-port 5354 \
            --blocklist-url https://urlhaus.abuse.ch/downloads/hostfile/ \
            --enforce
          # Give the blocklist time to download.
          sleep 8
          docker logs sd | grep -E "listening|blocklist refreshed"
          # Resolve a benign domain — should succeed.
          dig @127.0.0.1 -p 5354 google.com +short +tries=1 +time=3
          # Block test — known URLhaus entry should NXDOMAIN.
          dig @127.0.0.1 -p 5354 1ce6-route.fixionmunici9al.lat | grep -q "status: NXDOMAIN"
          docker stop sd
