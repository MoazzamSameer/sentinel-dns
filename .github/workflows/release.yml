name: Release

on:
  push:
    tags: ["v*"]
  pull_request:
    paths:
      - "pyproject.toml"
      - "sentinel_dns/**"
      - ".github/workflows/release.yml"
  workflow_dispatch:

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build tooling
        run: python -m pip install --upgrade pip build

      - name: Build distributions
        run: python -m build

      - name: Show what was built
        run: ls -la dist/

      - name: Verify wheel installs in a clean venv
        run: |
          python -m venv /tmp/check-venv
          /tmp/check-venv/bin/pip install --upgrade pip
          /tmp/check-venv/bin/pip install dist/*.whl
          /tmp/check-venv/bin/sentinel-dns --help

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # Only on tag push, not on PRs.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/sentinel-dns
    permissions:
      # Trusted publishing — PyPI verifies the OIDC token from GitHub.
      # No PyPI API token stored as a GitHub secret.
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
